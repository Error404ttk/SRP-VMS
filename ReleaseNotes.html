<script>
  function showReleaseNotes() {
    const notes = (window.APP_CONFIG && window.APP_CONFIG.releaseNotes) || [];
    const html = notes.map(function (note) {
      const items = (note.items || []).map(function (item) {
        return '<li class="py-0.5">' + sphEscapeHtml(item) + '</li>';
      }).join('');

      const deployText = note.deploymentVersion ? ' / deploy ' + sphEscapeHtml(note.deploymentVersion) : '';

      return '<details class="group mb-3 border-b border-slate-100 pb-3 text-left last:border-b-0 last:pb-0 outline-none">' +
        '<summary class="flex cursor-pointer items-center justify-between py-1 outline-none select-none list-none [&::-webkit-details-marker]:hidden">' +
          '<div class="font-bold text-slate-900 flex-1 hover:text-sky-600 transition">' +
            '🚀 เวอร์ชั่น ' + sphEscapeHtml(note.version) + deployText + ' - ' + sphEscapeHtml(note.date) +
          '</div>' +
          '<span class="text-xs font-semibold text-sky-600 group-open:hidden transition">ดูรายละเอียด 🔽</span>' +
          '<span class="text-xs font-semibold text-slate-400 hidden group-open:inline transition">ย่อข้อมูล 🔼</span>' +
        '</summary>' +
        '<div class="mt-2 bg-slate-50 rounded-xl p-3 border-l-4 border-sky-500 transition-all duration-300">' +
          '<p class="text-sm font-bold text-slate-800 mb-1.5">' + sphEscapeHtml(note.title) + '</p>' +
          '<ul class="list-disc space-y-1 pl-5 text-sm text-slate-600 leading-relaxed">' + items + '</ul>' +
        '</div>' +
        '</details>';
    }).join('');

    Swal.fire({
      title: 'รายการอัปเดตระบบ (Release Notes)',
      html: html || '<p class="text-sm text-slate-500">ยังไม่มีรายการอัปเดต</p>',
      confirmButtonText: 'ปิด',
      width: 640
    });
  }

  function sphEscapeHtml(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
